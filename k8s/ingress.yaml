apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klinik-ingress
  namespace: klinik-antrian
  labels:
    app: klinik-antrian
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: klinik.local
      http:
        paths:
          # Frontend - default route
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # API routes - proxied to backend services
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 5001
          - path: /api/doctors
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 5002
          - path: /api/patients
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 5003
          - path: /api/queues
            pathType: Prefix
            backend:
              service:
                name: queue-service
                port:
                  number: 5004
